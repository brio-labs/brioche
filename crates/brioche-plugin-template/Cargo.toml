[package]
name = "{{project-name}}"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
authors = ["{{authors}}"]
license = "MIT OR Apache-2.0"
description = "A Brioche plugin generated from the official template"

[dependencies]
brioche-plugin-kit = "0.1"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
brioche-plugin-kit = { version = "0.1" }

[lints]
clippy.unwrap_used = "deny"
clippy.expect_used = "deny"
clippy.panic = "deny"
