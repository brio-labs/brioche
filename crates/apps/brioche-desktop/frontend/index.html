<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brioche Desktop</title>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
        window.addEventListener('error', function(e) {
            console.error('[Brioche] Global error:', e.message, 'at', e.filename, ':', e.lineno);
        });
        window.addEventListener('unhandledrejection', function(e) {
            console.error('[Brioche] Unhandled rejection:', e.reason);
        });
    </script>
</body>
</html>
