crc32fast = "1"
lru = "0.18"
serde = { version = "1", features = ["derive"] }
thiserror = "2"
tokio = { workspace = true }
tokio-util = { workspace = true }
serde_json = { workspace = true }
dirs = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
brioche-tools-system = { workspace = true }
rand = "0.8"
tracing = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
tokio-test = "0.4"
tempfile = "3"
divan = "=0.1.21"

[[bench]]
name = "benchmarks"
harness = false

[lints]
workspace = true
