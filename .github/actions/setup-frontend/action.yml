name: 'Setup and build Brioche Desktop frontend'
description: 'Install Node.js/pnpm and build the Tauri frontend assets'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Build desktop frontend
      shell: bash
      working-directory: crates/apps/brioche-desktop/frontend
      run: |
        pnpm install --frozen-lockfile
        pnpm build
