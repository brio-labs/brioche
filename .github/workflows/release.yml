name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # brioche-desktop embeds its frontend via tauri::generate_context!(), which
      # expects crates/apps/brioche-desktop/frontend/dist to exist at compile time.
      - uses: ./.github/actions/setup-frontend

      - uses: Swatinem/rust-cache@v2

      - name: Verify GPG-signed tag
        run: |
          git verify-tag ${{ github.ref_name }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets --all-features

      - name: Documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deny
        run: |
          cargo install cargo-deny
          cargo deny check all

      - name: Benchmarks
        run: cargo bench --workspace

  build:
    runs-on: ${{ matrix.os }}
    needs: [verify]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            profile: headless
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            profile: full
          - os: macos-latest
            target: x86_64-apple-darwin
            profile: desktop
          - os: macos-latest
            target: aarch64-apple-darwin
            profile: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # brioche-desktop embeds its frontend via tauri::generate_context!(), which
      # expects crates/apps/brioche-desktop/frontend/dist to exist at compile time.
      - uses: ./.github/actions/setup-frontend
        if: matrix.profile == 'desktop' || matrix.profile == 'full'

      - uses: Swatinem/rust-cache@v2

      # NOTE: Code signing and notarization are not configured for Brioche
      # Desktop 0.1. Release artifacts produced by this workflow are unsigned.
      # Platform-specific security warnings (macOS Gatekeeper, Windows
      # SmartScreen, Linux AppImage) are expected. Do not add signing secrets
      # or certificates here without a dedicated secret-management review.
      - name: Build release
        run: cargo build --workspace --profile ${{ matrix.profile }} --target ${{ matrix.target }}

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p brioche-core --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-governance --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-governance-default --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-macro --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-shell-runtime --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-shell-persistence --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-shell-projection --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-std --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-plugin-kit --token "$CARGO_REGISTRY_TOKEN" || true
