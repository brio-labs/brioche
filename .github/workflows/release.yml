name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  verify:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: ./.github/actions/setup-system-dependencies

      # brioche-desktop embeds its frontend via tauri::generate_context!(), which
      # expects crates/apps/brioche-desktop/frontend/dist to exist at compile time.
      - uses: ./.github/actions/setup-frontend

      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.7

      - name: Verify GPG-signed tag
        run: |
          git verify-tag ${{ github.ref_name }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets --all-features

      - name: Documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check all

      - name: Benchmarks
        run: cargo bench --workspace

  build:
    runs-on: ${{ matrix.os }}
    needs: [verify]
    strategy:
      matrix:
        include:
          - os: warp-ubuntu-latest-x64-4x
            target: x86_64-unknown-linux-gnu
            profile: headless
          - os: warp-ubuntu-latest-x64-4x
            target: x86_64-unknown-linux-gnu
            profile: full
          - os: blacksmith-6vcpu-macos-15
            target: x86_64-apple-darwin
            profile: desktop
          - os: blacksmith-6vcpu-macos-15
            target: aarch64-apple-darwin
            profile: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # brioche-desktop embeds its frontend via tauri::generate_context!(), which
      # expects crates/apps/brioche-desktop/frontend/dist to exist at compile time.
      # Build the frontend ahead of the workspace compile for profiles that include
      # the desktop crate.
      - uses: ./.github/actions/setup-frontend
        if: matrix.profile == 'desktop' || matrix.profile == 'full'

      - uses: ./.github/actions/setup-system-dependencies
        if: runner.os == 'Linux'

      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.7
      # NOTE: Code signing and notarization are not configured for Brioche
      # Desktop 0.1. Release artifacts produced by this workflow are unsigned.
      # Platform-specific security warnings (macOS Gatekeeper, Windows
      # SmartScreen, Linux AppImage) are expected. Do not add signing secrets
      # or certificates here without a dedicated secret-management review.
      - name: Build release
        run: cargo build --workspace --profile ${{ matrix.profile }} --target ${{ matrix.target }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brioche-${{ matrix.profile }}-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/${{ matrix.profile }}/agent-terminal
            target/${{ matrix.target }}/${{ matrix.profile }}/brioche-desktop
          if-no-files-found: ignore
          retention-days: 7

  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.7

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p brioche-core --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-governance --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-governance-default --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-macro --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-shell-runtime --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-shell-persistence --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-shell-projection --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-std --token "$CARGO_REGISTRY_TOKEN" || true
          cargo publish -p brioche-plugin-kit --token "$CARGO_REGISTRY_TOKEN" || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
