name: Benchmarks

on:
  pull_request:
    paths:
      - "crates/brioche-core/**"
      - "crates/brioche-governance/**"
      - "crates/brioche-governance-default/**"
      - "crates/brioche-shell-persistence/**"
      - "crates/brioche-shell-runtime/**"

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench --workspace | tee benchmark-results.txt
      - name: Check for benchmark results
        id: check
        run: |
          if grep -q "test result: ok. 0 passed" benchmark-results.txt; then
            echo "has_benchmarks=false" >> "$GITHUB_OUTPUT"
            echo "No benchmarks found — skipping comparison."
          else
            echo "has_benchmarks=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Compare with main
        if: steps.check.outputs.has_benchmarks == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "cargo"
          output-file-path: benchmark-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: true
