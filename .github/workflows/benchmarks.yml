name: Benchmarks

on:
  pull_request:
    paths:
      - ".github/workflows/benchmarks.yml"
      - "crates/kernel/brioche-core/**"
      - "crates/kernel/brioche-governance-default/**"
      - "crates/runtime/brioche-shell-persistence/**"
      - "crates/runtime/brioche-shell-runtime/**"
      - "crates/runtime/brioche-shell-projection/**"

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      core: ${{ steps.filter.outputs.core }}
      governance-default: ${{ steps.filter.outputs.governance-default }}
      shell-persistence: ${{ steps.filter.outputs.shell-persistence }}
      shell-runtime: ${{ steps.filter.outputs.shell-runtime }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            core:
              - ".github/workflows/benchmarks.yml"
              - "crates/kernel/brioche-core/**"
            governance-default:
              - ".github/workflows/benchmarks.yml"
              - "crates/kernel/brioche-governance-default/**"
            shell-persistence:
              - ".github/workflows/benchmarks.yml"
              - "crates/runtime/brioche-shell-persistence/**"
            shell-runtime:
              - ".github/workflows/benchmarks.yml"
              - "crates/runtime/brioche-shell-runtime/**"
              - "crates/runtime/brioche-shell-projection/**"

  bench:
    needs: [changes]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
          # github-action-benchmark's cargo parser handles Criterion output only.
          # Divan shards still run, but skip comparison until a parser is available.
          - name: core
            package: brioche-core
            bench: benchmarks
            changed: ${{ needs.changes.outputs.core }}
            compare: "false"
            args: ""
          - name: governance-default
            package: brioche-governance-default
            bench: benchmarks
            changed: ${{ needs.changes.outputs.governance-default }}
            compare: "false"
            args: ""
          - name: shell-persistence
            package: brioche-shell-persistence
            bench: benchmarks
            changed: ${{ needs.changes.outputs.shell-persistence }}
            compare: "false"
            args: ""
          - name: shell-runtime
            package: brioche-shell-runtime
            bench: effect_loop
            changed: ${{ needs.changes.outputs.shell-runtime }}
            compare: "true"
            args: "-- --sample-size 10 --measurement-time 1 --warm-up-time 1"
    name: bench (${{ matrix.name }})
    steps:
      - name: Skip unchanged benchmark shard
        if: matrix.changed != 'true'
        run: echo "No benchmark-relevant changes for ${{ matrix.name }}."
      - uses: actions/checkout@v7.0.0
        if: matrix.changed == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.changed == 'true'
      - uses: Swatinem/rust-cache@v2.9.1
        if: matrix.changed == 'true'
      - uses: mozilla-actions/sccache-action@v0.0.10
        if: matrix.changed == 'true'

      - name: Run ${{ matrix.name }} benchmarks
        if: matrix.changed == 'true'
        run: cargo bench --package ${{ matrix.package }} --bench ${{ matrix.bench }} --locked ${{ matrix.args }} | tee benchmark-results.txt
      - name: Check for benchmark results
        id: check
        if: matrix.changed == 'true' && matrix.compare == 'true'
        run: |
          if grep -Eq "time:" benchmark-results.txt; then
            echo "has_benchmarks=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_benchmarks=false" >> "$GITHUB_OUTPUT"
            echo "No benchmark results found — skipping comparison."
          fi
      - name: Compare with main
        if: matrix.changed == 'true' && matrix.compare == 'true' && steps.check.outputs.has_benchmarks == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "cargo"
          output-file-path: benchmark-results.txt
          benchmark-data-dir-path: dev/bench/${{ matrix.name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: true
