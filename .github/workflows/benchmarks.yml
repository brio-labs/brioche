name: Benchmarks

on:
  pull_request:
    paths:
      - ".github/workflows/benchmarks.yml"
      - "crates/kernel/brioche-core/**"
      - "crates/kernel/brioche-governance-default/**"
      - "crates/runtime/brioche-shell-persistence/**"
      - "crates/runtime/brioche-shell-runtime/**"
      - "crates/runtime/brioche-shell-projection/**"
permissions:
  contents: read
  pull-requests: write
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
jobs:
  bench:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-system-dependencies

      # brioche-desktop embeds its frontend via tauri::generate_context!(), which
      # expects crates/apps/brioche-desktop/frontend/dist to exist at compile time.
      - uses: ./.github/actions/setup-frontend

      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Run benchmarks
        run: cargo bench --workspace | tee benchmark-results.txt
      - name: Check for benchmark results
        id: check
        run: |
          if grep -q "test result: ok. 0 passed" benchmark-results.txt; then
            echo "has_benchmarks=false" >> "$GITHUB_OUTPUT"
            echo "No benchmarks found — skipping comparison."
          else
            echo "has_benchmarks=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Compare with main
        if: steps.check.outputs.has_benchmarks == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "cargo"
          output-file-path: benchmark-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: true
