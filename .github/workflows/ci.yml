name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: write
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Share compiler artifacts across jobs via GitHub Actions cache.
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

# Runner strategy:
# - Heavy, parallelizable Rust jobs (test, proptest) use 16 vCPU ARM runners.
# - Medium/light Rust jobs (clippy, test-doc) use 4 vCPU ARM runners.
#   ARM minutes cost ~0.625x x64 minutes, so these are cheaper than the old
#   x64 4 vCPU runners while still finishing faster.
# - Profile/benchmark smoke checks and lightweight gates stay on GitHub-hosted
#   ubuntu-latest to avoid adding Blacksmith cost where it isn't needed.

jobs:
  # -------------------------------------------------------------------------
  # Path filters — skip expensive jobs on pull requests that don't touch them.
  # On push/main all filters default to true so full CI still runs.
  # -------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      rust: ${{ steps.filter.outputs.rust || 'true' }}
      frontend: ${{ steps.filter.outputs.frontend || 'true' }}
      lock: ${{ steps.filter.outputs.lock || 'true' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dorny/paths-filter@v4.0.1
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            frontend:
              - 'crates/apps/brioche-desktop/frontend/**'
            lock:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '**/Cargo.toml'
              - 'deny.toml'

  # -------------------------------------------------------------------------
  # Gate 0 — Fast static checks (run in parallel)
  # -------------------------------------------------------------------------
  deny:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.lock == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check all

  fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # Nightly rustfmt enforces imports_granularity, group_imports,
  fmt-nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt
      - run: cargo +nightly-2026-06-15 fmt --check

  clippy:
    runs-on: blacksmith-8vcpu-ubuntu-2404-arm
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: ./.github/actions/setup-system-dependencies
      - uses: ./.github/actions/setup-frontend
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-system-dependencies
      - uses: ./.github/actions/setup-frontend
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-frontend
      - name: Build desktop frontend
        working-directory: crates/apps/brioche-desktop/frontend
        run: pnpm run build
      - name: Test desktop frontend
        working-directory: crates/apps/brioche-desktop/frontend
        run: pnpm test

  # -------------------------------------------------------------------------
  # Gate 0b — Dependency hygiene & architecture policy
  # -------------------------------------------------------------------------
  dependency-audit:
    runs-on: ubuntu-latest
    needs: [changes, deny]
    if: needs.changes.outputs.lock == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: Detect unused dependencies
        run: cargo machete

      - name: Surface duplicate transitive crates
        run: cargo tree --duplicates

      - name: Enforce architectural dependency boundaries
        run: |
          # Book IV / Infrastructure: brioche-std must NOT depend on shell/runtime crates.
          if cargo tree -p brioche-std -e normal | grep -E 'brioche-shell-(runtime|persistence|projection)'; then
            echo "❌ brioche-std illegally depends on shell runtime crates"
            exit 1
          fi
          echo "✓ brioche-std dependency boundary OK"

  # -------------------------------------------------------------------------
  # Gate 1 — Philosophy & invariant checks (run in parallel with tests)
  philosophy-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Build custom lint crates
        run: |
          cargo build --package cargo-brioche-lint
          cargo build --package cargo-brioche-lint-invariants

      - name: "Run cargo-brioche-lint (mechanism vs policy)"
        run: |
          # cargo-brioche-lint is designed for plugin crates (policy layer).
          # brioche-core is the mechanism layer — direct Session field access
          # there is legitimate kernel code, not a plugin violation.
          cargo run --package cargo-brioche-lint -- --path crates/kernel/brioche-governance
          cargo run --package cargo-brioche-lint -- --path crates/brioche-plugin-template
          # Self-test: assert the linter catches known-bad patterns.
          set +e
          cargo run --package cargo-brioche-lint -- --path crates/kernel/brioche-macro/tests/ui
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "❌ cargo-brioche-lint should have caught fail_hashmap.rs / fail_hashset.rs"
            exit 1
          fi
          echo "✓ cargo-brioche-lint catches HashMap/HashSet in extension state"

      - name: "Run cargo-brioche-lint-invariants (Refs: validation)"
        run: |
          cargo run --package cargo-brioche-lint-invariants -- check-refs --root crates/
          cargo run --package cargo-brioche-lint-invariants -- check-matrix

      - name: Comprehensive philosophy check
        run: python3 scripts/philosophy-check.py

  # -------------------------------------------------------------------------
  # Gate 2 — Test matrix (unit, doc, property)
  # -------------------------------------------------------------------------
  test:
    runs-on: blacksmith-16vcpu-ubuntu-2404-arm
    needs: [changes, clippy, deny]
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-system-dependencies
      - uses: ./.github/actions/setup-frontend
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - run: cargo test --workspace --all-targets --all-features

  test-doc:
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    needs: [changes, clippy]
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-system-dependencies
      - uses: ./.github/actions/setup-frontend
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - run: cargo test --workspace --doc --all-features

  # Property tests with a high case count to surface edge-case failures
  # that unit tests miss (PHILOSOPHY.md §5.4, docs/SPECS.md Book V Ch.10).
  proptest:
    runs-on: blacksmith-16vcpu-ubuntu-2404-arm
    needs: [changes, clippy, deny]
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-system-dependencies
      - uses: ./.github/actions/setup-frontend
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run property tests (high volume)
        run: cargo test --package brioche-core --test property_transition --all-features
        env:
          PROPTEST_CASES: "10000"

  # -------------------------------------------------------------------------
  # Gate 3 — Profile smoke checks & benchmark smoke tests
  # -------------------------------------------------------------------------
  # Use `cargo check` here instead of `cargo build`. It validates that the
  # workspace compiles under each release profile (features, cfg flags,
  # profile-specific dependencies) without paying for codegen, LTO, and linking.
  # The release workflow runs the full `cargo build --profile` with fat LTO.
  profiles:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs: [changes, clippy, deny]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      matrix:
        profile: [headless, desktop, wasm-test, full]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-system-dependencies

      # brioche-desktop embeds its frontend via tauri::generate_context!(), which
      # expects crates/apps/brioche-desktop/frontend/dist to exist at compile time.
      # Build the frontend ahead of the workspace compile for profiles that include
      # the desktop crate.
      - uses: ./.github/actions/setup-frontend
        if: matrix.profile == 'desktop' || matrix.profile == 'full'

      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Check profile ${{ matrix.profile }}
        run: |
          if [ "${{ matrix.profile }}" = "headless" ] || [ "${{ matrix.profile }}" = "wasm-test" ]; then
            # These profiles target non-desktop targets; brioche-desktop requires
            # a built Tauri frontend, so exclude it from the compile matrix here.
            cargo check --workspace --profile ${{ matrix.profile }} --exclude brioche-desktop
          else
            cargo check --workspace --profile ${{ matrix.profile }}
          fi
  benchmark-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs: [changes, clippy, deny]
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-system-dependencies
      - uses: ./.github/actions/setup-frontend
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Check benchmarks compile
        run: cargo check --workspace --benches
      - name: Smoke-run key benchmarks (minimal sample)
        run: |
          # Divan: --test runs each benchmark once to verify they execute
          # without panic, without collecting timing data.
          cargo bench --package brioche-core --bench benchmarks -- --test
          cargo bench --package brioche-governance-default --bench benchmarks -- --test
          cargo bench --package brioche-shell-persistence --bench benchmarks -- --test

  # -------------------------------------------------------------------------
  # Gate 4 — Security audit
  # -------------------------------------------------------------------------
  audit:
    runs-on: ubuntu-latest
    needs: [changes, deny]
    if: needs.changes.outputs.lock == 'true'
    permissions:
      contents: read
      checks: write
      security-events: write
      pull-requests: write
    env:
      # rustsec/audit-check installs cargo-audit itself; sccache is not set up
      # in this job, so disable the global RUSTC_WRAPPER to avoid a missing
      # binary error during `cargo install cargo-audit`.
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
